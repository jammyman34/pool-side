name: PoolSide
options:
  bundleIdPrefix: com.justinmandell
  deploymentTarget:
    iOS: "18.2"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_BITCODE: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  PoolSide:
    type: application
    platform: iOS
    sources:
      - path: PoolSide
        excludes:
          - "**/.DS_Store"
    resources:
      - path: PoolSide/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.justinmandell.poolside
        PRODUCT_NAME: Pool Side
        INFOPLIST_FILE: PoolSide/Info.plist
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
      configs:
        Debug:
          DEBUG: YES
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          VALIDATE_PRODUCT: YES

schemes:
  PoolSide:
    build:
      targets:
        PoolSide: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
